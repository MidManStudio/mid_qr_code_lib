name: Build & deploy site → GitHub Pages

# ─────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
    paths:
      - 'site/**'          # website source
      - 'crates/**'        # Rust core / WASM
      - 'npm/**'           # TypeScript library
  workflow_dispatch:       # manual trigger from Actions tab

# ─────────────────────────────────────────────────────────────────────
# Job
# ─────────────────────────────────────────────────────────────────────
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push gh-pages branch

    steps:

      # ── 1. Source ────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Rust / WASM ───────────────────────────────────────────────
      - name: Install Rust stable (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      # ── 3. Optimise WASM ─────────────────────────────────────────────
      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Optimise WASM binary
        run: |
          wasm-opt npm/wasm/mid_qr_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            -o npm/wasm/mid_qr_wasm_bg.wasm
          echo "wasm-opt done — $(du -sh npm/wasm/mid_qr_wasm_bg.wasm | cut -f1)"

      - name: Verify WASM artefacts
        run: |
          for f in \
            npm/wasm/mid_qr_wasm_bg.wasm \
            npm/wasm/mid_qr_wasm.js \
            npm/wasm/mid_qr_wasm.d.ts; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
            echo "OK  $f  ($(du -sh "$f" | cut -f1))"
          done

      # ── 4. Nimiq scanner ─────────────────────────────────────────────
      - name: Fetch nimiq QR scanner files
        run: |
          BASE="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          for f in \
            qr-scanner.min.js \
            qr-scanner-worker.min.js \
            qr-scanner.umd.min.js; do
            curl -fsSL "$BASE/$f" -o "npm/src/worker/$f"
            echo "OK  npm/src/worker/$f"
          done

      # ── 5. TypeScript / npm ──────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm modules
        uses: actions/cache@v4
        with:
          path: npm/node_modules
          key: npm-${{ hashFiles('npm/package-lock.json') }}
          restore-keys: npm-

      - name: Install npm dependencies
        working-directory: npm
        run: npm install

      - name: Build TypeScript (tsc + rollup)
        working-directory: npm
        run: npm run build:ts

      - name: Verify TS artefacts
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
            echo "OK  $f"
          done

      # ── 6. Assemble site ─────────────────────────────────────────────
      - name: Assemble GitHub Pages output
        run: |
          rm -rf _site
          mkdir -p _site/css \
                   _site/js/worker \
                   _site/wasm

          # Root files
          cp site/index.html _site/index.html
          touch _site/.nojekyll

          # Stylesheets
          for sheet in variables reset layout components panels responsive; do
            cp "site/css/${sheet}.css" "_site/css/${sheet}.css"
          done

          # Site JS modules (native ES modules — no bundling required)
          for mod in app qr-engine controls preview download; do
            cp "site/js/${mod}.js" "_site/js/${mod}.js"
          done

          # Compiled library  →  exposed as js/mid-qr.js
          # (path matches the dynamic import in qr-engine.js)
          cp npm/dist/index.js _site/js/mid-qr.js

          # WASM binary + JS glue
          # js/mid-qr.js dynamically imports ../wasm/mid_qr_wasm.js at runtime
          cp npm/wasm/mid_qr_wasm_bg.wasm  _site/wasm/
          cp npm/wasm/mid_qr_wasm.js       _site/wasm/

          # Nimiq scanner
          # UMD  →  loaded via <script> tag, sets window.QrScanner
          # Worker  →  loaded by the UMD scanner for camera decode
          cp npm/src/worker/qr-scanner.umd.min.js      _site/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   _site/js/worker/
          cp npm/src/worker/qr-scanner.min.js          _site/js/worker/

          echo ""
          echo "── Deployed file tree ────────────────────────────────"
          find _site -type f | sort
          echo "──────────────────────────────────────────────────────"
          echo "Total: $(du -sh _site | cut -f1)"

      # ── 7. Deploy ────────────────────────────────────────────────────
      - name: Push to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch existing gh-pages if it exists (for --staged diff check)
          git fetch origin gh-pages 2>/dev/null || true

          # Create a throwaway orphan branch, wipe the tree, add site files
          git checkout --orphan gh-pages-tmp
          git rm -rf . --quiet 2>/dev/null || true

          cp -r _site/. .
          rm -rf _site

          git add .

          if git diff --staged --quiet; then
            echo "Nothing changed — skipping deploy."
            exit 0
          fi

          git commit -m "deploy: $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:gh-pages --force

          echo ""
          echo "Site deployed to gh-pages branch."
          echo "Live at: https://$(echo $GITHUB_REPOSITORY | cut -d/ -f1).github.io/$(echo $GITHUB_REPOSITORY | cut -d/ -f2)/"
