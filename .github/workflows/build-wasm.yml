name: Build WASM + assemble dist

on:
  push:
    branches: [ main, master ]
    paths:
      - 'crates/**'
      - 'npm/**'
      - 'site/**'
      - 'wrappers/blazor/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
  workflow_call:
    outputs:
      dist-sha:
        description: "SHA of the dist branch commit"
        value: ${{ jobs.build.outputs.dist-sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      dist-sha: ${{ steps.push-dist.outputs.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run mid-qr-core tests
        run: cargo test -p mid-qr-core --features generate,decode

      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Optimise WASM
        run: |
          wasm-opt npm/wasm/mid_qr_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            -o npm/wasm/mid_qr_wasm_bg.wasm
          echo "wasm-opt done ($(du -sh npm/wasm/mid_qr_wasm_bg.wasm | cut -f1))"

      - name: Verify WASM artefacts
        run: |
          for f in \
            npm/wasm/mid_qr_wasm_bg.wasm \
            npm/wasm/mid_qr_wasm.js \
            npm/wasm/mid_qr_wasm.d.ts; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
            echo "OK $f ($(du -sh "$f" | cut -f1))"
          done

      - name: Copy WASM to Blazor wwwroot
        run: |
          mkdir -p wrappers/blazor/wwwroot/wasm
          cp npm/wasm/mid_qr_wasm_bg.wasm  wrappers/blazor/wwwroot/wasm/
          cp npm/wasm/mid_qr_wasm.js       wrappers/blazor/wwwroot/wasm/
          cp npm/wasm/mid_qr_wasm.d.ts     wrappers/blazor/wwwroot/wasm/

      - name: Fetch nimiq scanner files
        run: |
          NIMIQ_BASE="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          for f in \
            qr-scanner.min.js \
            qr-scanner-worker.min.js \
            qr-scanner.umd.min.js; do
            TARGET="npm/src/worker/$f"
            if [ ! -f "$TARGET" ]; then
              curl -fsSL "$NIMIQ_BASE/$f" -o "$TARGET"
              echo "fetched $TARGET"
            else
              echo "exists $TARGET"
            fi
          done
          # Copy to Blazor wwwroot
          mkdir -p wrappers/blazor/wwwroot/js/worker
          for f in \
            qr-scanner.min.js \
            qr-scanner-worker.min.js \
            qr-scanner.umd.min.js; do
            cp "npm/src/worker/$f" "wrappers/blazor/wwwroot/js/worker/$f"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm modules
        uses: actions/cache@v4
        with:
          path: npm/node_modules
          key: npm-${{ hashFiles('npm/package-lock.json') }}
          restore-keys: npm-

      - name: Install npm dependencies
        working-directory: npm
        run: npm install

      - name: Build TypeScript
        working-directory: npm
        run: npm run build:ts

      - name: Verify TS build output
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
            echo "OK $f"
          done

      - name: Assemble dist directory
        run: |
          rm -rf dist-out
          mkdir -p dist-out/npm/worker \
                   dist-out/blazor/wasm \
                   dist-out/blazor/js/worker \
                   dist-out/site/css \
                   dist-out/site/js/worker \
                   dist-out/site/wasm \
                   dist-out/test

          # ── npm package ────────────────────────────────────────────
          cp -r npm/dist         dist-out/npm/dist
          cp -r npm/wasm         dist-out/npm/wasm
          cp    npm/package.json dist-out/npm/
          cp npm/src/worker/qr-scanner.min.js        dist-out/npm/worker/
          cp npm/src/worker/qr-scanner-worker.min.js dist-out/npm/worker/
          cp npm/src/worker/qr-scanner.umd.min.js    dist-out/npm/worker/

          # ── Blazor wrapper ─────────────────────────────────────────
          cp -r wrappers/blazor/wwwroot/wasm dist-out/blazor/wasm
          cp -r wrappers/blazor/wwwroot/js   dist-out/blazor/js

          # ── Website snapshot (matches pages.yml structure) ─────────
          cp site/index.html dist-out/site/index.html
          touch dist-out/site/.nojekyll
          for sheet in variables reset layout components panels responsive; do
            cp "site/css/${sheet}.css" "dist-out/site/css/${sheet}.css"
          done
          for mod in app qr-engine controls preview download; do
            cp "site/js/${mod}.js" "dist-out/site/js/${mod}.js"
          done
          cp npm/dist/index.js           dist-out/site/js/mid-qr.js
          cp npm/wasm/mid_qr_wasm_bg.wasm dist-out/site/wasm/
          cp npm/wasm/mid_qr_wasm.js      dist-out/site/wasm/
          cp npm/src/worker/qr-scanner.umd.min.js      dist-out/site/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   dist-out/site/js/worker/
          cp npm/src/worker/qr-scanner.min.js          dist-out/site/js/worker/

          # ── Legacy test app ────────────────────────────────────────
          cp -r test/. dist-out/test/

          echo "dist tree assembled"
          find dist-out -type f | sort

      - name: Write dist README
        run: |
          cat > dist-out/README.md << 'DISTEOF'
          # mid-qr dist branch

          Built artefacts — do not edit manually. Source is on main.

          ## npm install from GitHub dist branch
          ```bash
          npm install github:Mid-D-Man/mid-qr#dist
          ```

          ## Blazor
          Copy `blazor/wasm/` → `wwwroot/wasm/`
          Copy `blazor/js/`   → `wwwroot/js/`

          ## Website snapshot
          The `site/` directory contains a pre-assembled version of the
          website matching the gh-pages deployment.
          DISTEOF

      - name: Push dist branch
        id: push-dist
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin dist 2>/dev/null || true
          git checkout --orphan dist-tmp
          git rm -rf . --quiet 2>/dev/null || true
          cp -r dist-out/. .
          rm -rf dist-out
          git add .
          if git diff --staged --quiet; then
            echo "nothing changed"
            exit 0
          fi
          git commit -m "chore: dist build $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:dist --force
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "dist branch updated: $SHA"
